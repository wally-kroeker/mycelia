name = "mycelia-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
# Operators: set your Cloudflare account id here, or export CLOUDFLARE_ACCOUNT_ID.
account_id = "<your-cloudflare-account-id>"

[vars]
ENVIRONMENT = "production"
# ADMIN_OWNER_ID — owner_id authorized for revoke/unrevoke admin actions.
# Downstream operators MUST set this to their own owner_id.
ADMIN_OWNER_ID = "<your-admin-owner-id>"
# MODE — trust-enforcement spectrum. REQUIRED. Node refuses to start without a valid value.
# 'community' = open/public, full trust system load-bearing. Default for public nodes.
# 'company'   = private org node; community trust rules + fleet registration/feed scoping.
# 'fleet'     = single principal's own agents; trust implicit, revocation is the control.
# See src/middleware/fleet-gate.ts for the full feature matrix.
MODE = "community"

[[d1_databases]]
binding = "DB"
database_name = "mycelia-db"
# Operators: run `wrangler d1 create mycelia-db` and paste the id here.
database_id = "<your-d1-database-id>"

[[kv_namespaces]]
binding = "KV"
# Operators: run `wrangler kv namespace create MYCELIA_CACHE` and paste the id here.
id = "<your-kv-namespace-id>"

[[r2_buckets]]
binding = "R2_AUDIT"
bucket_name = "mycelia-audit"

# Cron trigger for timeouts/expiry
[triggers]
crons = ["*/15 * * * *"]

[env.dev]
name = "mycelia-dev"

[[env.dev.d1_databases]]
binding = "DB"
database_name = "mycelia-dev"
database_id = "<your-dev-d1-database-id>"

[[env.dev.kv_namespaces]]
binding = "KV"
id = "<your-dev-kv-namespace-id>"

[[env.dev.r2_buckets]]
binding = "R2_AUDIT"
bucket_name = "mycelia-audit-dev"

[env.dev.vars]
ENVIRONMENT = "dev"
# Fleet owner_id — owner who can admin/revoke agents on this node.
ADMIN_OWNER_ID = "<your-dev-admin-owner-id>"
# MODE for dev node — set to 'fleet' to run as a dedicated fleet node.
MODE = "community"
