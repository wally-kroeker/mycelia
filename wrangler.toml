name = "mycelia-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
account_id = "359bbec67c35603c232096900443f5f5"

[observability]
enabled = true

[vars]
ENVIRONMENT = "production"

[[d1_databases]]
binding = "DB"
database_name = "mycelia-db"
database_id = "2d0fcc8f-388d-438f-84de-fa819b67a929"

[[kv_namespaces]]
binding = "KV"
id = "4be87b971aa44128a9f2cdeccd4306b8"


# Service Bindings — directed-synchronous fleet RPC (Step 5 2026-05-18)
# 3 of 4 workers wired: mirror, gemini, mistral. Brook deferred (DO, different shape).
# Spec: docs/specs/WORKER_ENTRYPOINT_SHAPE.md
[[services]]
binding = "MIRROR"
service = "mirror-worker"
entrypoint = "MirrorApi"

[[services]]
binding = "GEMINI"
service = "gemini-worker"
entrypoint = "GeminiApi"

[[services]]
binding = "MISTRAL"
service = "mistral-worker"
entrypoint = "MistralApi"


# Cron trigger for timeouts/expiry
[triggers]
crons = ["*/15 * * * *"]
