name = "mycelia-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
account_id = "fc6ac609a885ab8191809ec35bc8e58f"

[vars]
ENVIRONMENT = "production"

[[d1_databases]]
binding = "DB"
database_name = "mycelia-db"
database_id = "b5c669b5-b51e-41ad-a521-cf41cdd24bba"

[[kv_namespaces]]
binding = "KV"
id = "fea48e2a98d84a3bbdff2e47195683e2"

[[r2_buckets]]
binding = "R2_AUDIT"
bucket_name = "mycelia-audit"

# Cron trigger for timeouts/expiry
[triggers]
crons = ["*/15 * * * *"]

[env.dev]
name = "mycelia-dev"

[[env.dev.d1_databases]]
binding = "DB"
database_name = "mycelia-dev"
database_id = "b99e5be7-d2f8-4b44-9fb7-7dcd1e0c1a0b"

[[env.dev.kv_namespaces]]
binding = "KV"
id = "9c1cb6d8673c4debba9a47cacf6b575c"

[[env.dev.r2_buckets]]
binding = "R2_AUDIT"
bucket_name = "mycelia-audit-dev"

[env.dev.vars]
ENVIRONMENT = "dev"
