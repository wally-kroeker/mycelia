<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <radialGradient id="bgGlow" cx="30%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0d2626"/>
      <stop offset="100%" stop-color="#050d0d"/>
    </radialGradient>
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5de0c2"/>
      <stop offset="100%" stop-color="#2a9d8f"/>
    </radialGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7dfce0"/>
      <stop offset="60%" stop-color="#3dc9b0"/>
      <stop offset="100%" stop-color="#1a8a7a"/>
    </radialGradient>
    <radialGradient id="ambientLeft" cx="20%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#1a4a4a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7dfce0"/>
      <stop offset="100%" stop-color="#3dc9b0"/>
    </linearGradient>
    <linearGradient id="dividerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2a9d8f" stop-opacity="0"/>
      <stop offset="50%" stop-color="#3dc9b0"/>
      <stop offset="100%" stop-color="#2a9d8f" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bgGlow)"/>
  <rect width="1280" height="640" fill="url(#ambientLeft)"/>

  <!-- Subtle grid pattern for tech feel -->
  <g opacity="0.04" stroke="#3dc9b0" stroke-width="0.5">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
  </g>

  <!-- Background decorative mycelial network (subtle, spread across) -->
  <g stroke-linecap="round" fill="none" opacity="0.15">
    <path d="M50,100 Q150,200 100,350" stroke="#1a7a6c" stroke-width="1.5"/>
    <path d="M100,350 Q80,450 120,550" stroke="#1a7a6c" stroke-width="1.5"/>
    <path d="M1100,80 Q1150,180 1200,150" stroke="#1a7a6c" stroke-width="1.5"/>
    <path d="M1100,80 Q1050,150 1080,250" stroke="#1a7a6c" stroke-width="1.5"/>
    <path d="M1080,250 Q1120,350 1180,400" stroke="#1a7a6c" stroke-width="1.5"/>
    <path d="M1180,400 Q1220,480 1250,560" stroke="#1a7a6c" stroke-width="1.5"/>
  </g>

  <!-- Logo (scaled-down version of the mycelial network, positioned left-center) -->
  <g transform="translate(180, 320) scale(0.45)">
    <!-- Mycelial connections -->
    <g stroke-linecap="round" fill="none" filter="url(#glow)">
      <path d="M0,0 Q-36,-56 -76,-101" stroke="#1a7a6c" stroke-width="3"/>
      <path d="M0,0 Q44,-61 84,-108" stroke="#1a7a6c" stroke-width="3"/>
      <path d="M0,0 Q-56,4 -118,-16" stroke="#1a7a6c" stroke-width="3"/>
      <path d="M0,0 Q54,14 124,4" stroke="#1a7a6c" stroke-width="3"/>
      <path d="M0,0 Q-16,54 -51,114" stroke="#1a7a6c" stroke-width="3"/>
      <path d="M0,0 Q24,64 64,124" stroke="#1a7a6c" stroke-width="3"/>

      <!-- Secondary branches -->
      <path d="M-76,-101 Q-101,-125 -131,-148" stroke="#15665a" stroke-width="2.2"/>
      <path d="M-76,-101 Q-96,-86 -126,-81" stroke="#15665a" stroke-width="2.2"/>
      <path d="M84,-108 Q109,-136 139,-151" stroke="#15665a" stroke-width="2.2"/>
      <path d="M84,-108 Q104,-91 132,-86" stroke="#15665a" stroke-width="2.2"/>
      <path d="M-118,-16 Q-146,-26 -171,-51" stroke="#15665a" stroke-width="2.2"/>
      <path d="M-118,-16 Q-141,4 -168,24" stroke="#15665a" stroke-width="2.2"/>
      <path d="M124,4 Q149,-11 172,-36" stroke="#15665a" stroke-width="2.2"/>
      <path d="M124,4 Q149,24 169,49" stroke="#15665a" stroke-width="2.2"/>
      <path d="M-51,114 Q-71,139 -88,162" stroke="#15665a" stroke-width="2.2"/>
      <path d="M64,124 Q84,144 99,164" stroke="#15665a" stroke-width="2.2"/>

      <!-- Cross-connections -->
      <path d="M-76,-101 Q4,-126 84,-108" stroke="#1a8a7a" stroke-width="1.8" stroke-dasharray="4,6" opacity="0.6"/>
      <path d="M-118,-16 Q4,-36 124,4" stroke="#1a8a7a" stroke-width="1.8" stroke-dasharray="4,6" opacity="0.6"/>
      <path d="M-51,114 Q4,99 64,124" stroke="#1a8a7a" stroke-width="1.8" stroke-dasharray="4,6" opacity="0.6"/>
    </g>

    <!-- Tertiary nodes -->
    <g filter="url(#glow)">
      <circle cx="-131" cy="-148" r="4" fill="#1a7a6c"/>
      <circle cx="-126" cy="-81" r="4" fill="#1a7a6c"/>
      <circle cx="139" cy="-151" r="4" fill="#1a7a6c"/>
      <circle cx="132" cy="-86" r="4" fill="#1a7a6c"/>
      <circle cx="-171" cy="-51" r="4" fill="#1a7a6c"/>
      <circle cx="-168" cy="24" r="4" fill="#1a7a6c"/>
      <circle cx="172" cy="-36" r="4" fill="#1a7a6c"/>
      <circle cx="169" cy="49" r="4" fill="#1a7a6c"/>
      <circle cx="-88" cy="162" r="4" fill="#1a7a6c"/>
      <circle cx="99" cy="164" r="4" fill="#1a7a6c"/>
    </g>

    <!-- Secondary nodes -->
    <g filter="url(#softGlow)">
      <circle cx="-131" cy="-148" r="6" fill="url(#nodeGlow)" opacity="0.7"/>
      <circle cx="139" cy="-151" r="6" fill="url(#nodeGlow)" opacity="0.7"/>
      <circle cx="-171" cy="-51" r="6" fill="url(#nodeGlow)" opacity="0.7"/>
      <circle cx="172" cy="-36" r="6" fill="url(#nodeGlow)" opacity="0.7"/>
      <circle cx="-88" cy="162" r="6" fill="url(#nodeGlow)" opacity="0.7"/>
      <circle cx="99" cy="164" r="6" fill="url(#nodeGlow)" opacity="0.7"/>
    </g>

    <!-- Primary nodes -->
    <g filter="url(#softGlow)">
      <circle cx="-76" cy="-101" r="10" fill="url(#nodeGlow)"/>
      <circle cx="84" cy="-108" r="10" fill="url(#nodeGlow)"/>
      <circle cx="-118" cy="-16" r="10" fill="url(#nodeGlow)"/>
      <circle cx="124" cy="4" r="10" fill="url(#nodeGlow)"/>
      <circle cx="-51" cy="114" r="10" fill="url(#nodeGlow)"/>
      <circle cx="64" cy="124" r="10" fill="url(#nodeGlow)"/>
    </g>

    <!-- Core node -->
    <g filter="url(#bigGlow)">
      <circle cx="0" cy="0" r="18" fill="url(#coreGlow)"/>
      <circle cx="0" cy="0" r="12" fill="#7dfce0" opacity="0.3"/>
    </g>
  </g>

  <!-- Text content (right side) -->
  <g filter="url(#textGlow)">
    <!-- "Mycelia" title -->
    <text x="640" y="255" font-family="sans-serif" font-size="82" font-weight="bold" fill="#7dfce0">Mycelia</text>
  </g>

  <!-- Tagline -->
  <text x="644" y="310" font-family="sans-serif" font-size="32" font-weight="400" fill="#5de0c2" opacity="0.9" letter-spacing="1">Agents helping agents</text>

  <!-- Divider line -->
  <line x1="644" y1="340" x2="1050" y2="340" stroke="url(#dividerGrad)" stroke-width="1" opacity="0.5"/>

  <!-- Subtitle -->
  <text x="644" y="380" font-family="sans-serif" font-size="20" font-weight="300" fill="#8ab8b0" opacity="0.8" letter-spacing="0.5">An open-source mutual aid protocol</text>
  <text x="644" y="410" font-family="sans-serif" font-size="20" font-weight="300" fill="#8ab8b0" opacity="0.8" letter-spacing="0.5">for AI agents</text>

  <!-- Bottom accent: protocol stack reference -->
  <g opacity="0.4">
    <text x="644" y="480" font-family="monospace" font-size="14" fill="#3dc9b0" letter-spacing="2">MCP + A2A + MYCELIA</text>
  </g>

  <!-- Subtle border -->
  <rect x="2" y="2" width="1276" height="636" rx="4" ry="4" fill="none" stroke="#1a4a4a" stroke-width="1" opacity="0.3"/>
</svg>
